<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assefa - Raw HTML Project</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <!--The navigation Bar-->
    <header class="navbar">
        <h2 class="logo">Assefa Bekele</h2>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Portfolio</a>
        </nav>
    </header>
    <!--The main content-->
    <main class="hero-section">
        <h1>Bridging Health and Technology</h1>
        <p id="dynamic-text">I am building this from scratch using raw code!</p>
        <a href="#" class="btn-primary" id="action-btn">Explore My Work</a>
    </main>

    <!-- Health Data App Section-->
     <section class="calculator-section" style="padding: 40px; text-align: center; background-color: 
     #f1f1f1; margin-top: 40px;">
     <h2>Health Data App: BMI Calculator</h2>

     <div style="margin: 20px 0;">
        <label>Weight (Kg): </label>
        <input type="number" id="weight" placeholder="e.g. 70" style="padding: 5px;">
     </div>

     <div style="margin: 20px 0;">
        <label>Height (cm): </label>
        <input type="number" id="height" placeholder="e.g. 175" style="padding: 5px">
     </div>

     <button class="btn-primary" id="calc-btn">Calculate BMI</button>
     <h3 id="bmi-result" style="margin-top: 20px; color: #1a3a5f;">Result Will appear here</h3>
     </section>

     

    <script src="script.js"></script>
</body>
</html>
